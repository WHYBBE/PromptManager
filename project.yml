name: PromptManager
options:
  minimumXcodeGenVersion: 2.38.0
  developmentLanguage: zh-Hans
configs:
  Debug: debug
  Release: release
targets:
  PromptManager:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/PromptManager
      - path: PromptManager
        excludes:
          - Assets.xcassets/AppIcon.appiconset/README.md
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tom.PromptManager
        PRODUCT_NAME: Prompt Manager
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PromptManager/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    info:
      path: PromptManager/Info.plist
    scheme:
      testTargets: []
